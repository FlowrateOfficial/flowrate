# ANCHOR: CI — lint, typecheck, test, build
name: CI

on:
  pull_request:
    branches: [feature, master]
  push:
    branches: [feature, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Placeholders — compile-time only; no live DB or third-party calls in this job
      DATABASE_URL: postgresql://ci:ci@localhost:5432/flowrate
      NUXT_SESSION_PASSWORD: ci-session-password-at-least-32-characters
      APP_URL: https://flowrate-dev.vercel.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
